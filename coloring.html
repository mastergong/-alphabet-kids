<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🖌️ ระบายสี</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
body { font-family:'Fredoka One','Sarabun',sans-serif; overflow:hidden; height:100dvh; width:100vw; background:#1a1a2e; touch-action:pan-y; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; transition:opacity .35s,transform .35s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }
.btn { transition:transform .15s; cursor:pointer; user-select:none; }
.btn:active { transform:scale(0.88)!important; }
.pic-card { border-radius:20px; cursor:pointer; background:#fff; border:3px solid rgba(255,255,255,.4); transition:transform .2s,box-shadow .2s; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; gap:6px; }
.pic-card:active { transform:scale(0.88); }
.pal-btn { width:clamp(34px,9vw,52px); height:clamp(34px,9vw,52px); border-radius:50%; cursor:pointer; border:3px solid rgba(255,255,255,.4); transition:transform .2s,border-color .2s,box-shadow .2s; flex-shrink:0; }
.pal-btn:active { transform:scale(0.88); }
.pal-btn.selected { border-color:#fff; box-shadow:0 0 0 3px rgba(255,255,255,.8),0 4px 16px rgba(0,0,0,.5); transform:scale(1.15); }
.fillable { cursor:pointer; transition:filter .15s; }
.fillable:hover { filter:brightness(1.1); }
svg .fillable { pointer-events: all; }
svg .nofill { pointer-events: none; }
@keyframes pop { 0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)} }
</style>
</head>
<body>

<!-- HUD -->
<div style="position:fixed;top:0;left:0;right:0;z-index:200;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;">

<!-- Picture Picker Screen -->

  <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:10px 16px;overflow-y:auto;align-content:start;">

        <line x1="20" y1="100" x2="50" y2="100" stroke="#333" stroke-width="3" stroke-linecap="round"/>
        <line x1="150" y1="100" x2="180" y2="100" stroke="#333" stroke-width="3" stroke-linecap="round"/>
        <line x1="43" y1="43" x2="64" y2="64" stroke="#333" stroke-width="3" stroke-linecap="round"/>
        <line x1="136" y1="136" x2="157" y2="157" stroke="#333" stroke-width="3" stroke-linecap="round"/>
        <line x1="157" y1="43" x2="136" y2="64" stroke="#333" stroke-width="3" stroke-linecap="round"/>
        <line x1="43" y1="157" x2="64" y2="136" stroke="#333" stroke-width="3" stroke-linecap="round"/>

        <circle cx="120" cy="110" r="12" fill="#333"/>

        <circle cx="123" cy="107" r="4" fill="#fff"/>

        <line x1="60" y1="130" x2="92" y2="135" stroke="#333" stroke-width="1.5"/>
        <line x1="140" y1="130" x2="108" y2="135" stroke="#333" stroke-width="1.5"/>
        <line x1="55" y1="140" x2="92" y2="138" stroke="#333" stroke-width="1.5"/>
        <line x1="145" y1="140" x2="108" y2="138" stroke="#333" stroke-width="1.5"/>
      </svg>
      <div style="color:#333;font-weight:900;font-size:clamp(14px,4vw,18px);">🐱 แมว</div>
    </div>

    <div class="pic-card btn" onclick="openPicture('house')">

        <rect x="30" y="100" width="140" height="90" fill="#fff" stroke="#333" stroke-width="3"/>

        <rect x="80" y="140" width="40" height="50" fill="#fff" stroke="#333" stroke-width="2.5"/>
        <rect x="40" y="110" width="35" height="30" rx="3" fill="#fff" stroke="#333" stroke-width="2"/>

      </svg>

    </div>

      <div style="color:#333;font-weight:900;font-size:clamp(14px,4vw,18px);">🌸 ดอกไม้</div>

    </div>

  </div>
</div>

<!-- Coloring Screen -->
<div id="scolor" class="screen hidden" style="background:linear-gradient(135deg,#89f7fe,#66a6ff);">
  <div style="padding-top:62px;display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;flex-shrink:0;padding-bottom:6px;">
    <button onclick="exitColor()" class="btn" style="background:rgba(255,255,255,.3);border:none;border-radius:50%;width:48px;height:48px;font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;">←</button>
    <div id="ctitle" style="color:#fff;font-size:clamp(16px,5vw,24px);font-weight:900;"></div>
    <button onclick="clearPicture()" class="btn" style="background:rgba(255,255,255,.3);border:none;border-radius:14px;padding:8px 14px;color:#fff;font-size:clamp(13px,3.8vw,16px);font-weight:900;font-family:inherit;">🗑️ ล้าง</button>
  </div>

  <!-- SVG Canvas -->
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:8px;min-height:0;">
    <div id="svgwrap" style="background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;width:100%;max-width:min(calc(100vw - 32px),calc(100dvh - 220px));aspect-ratio:1;"></div>
  </div>

  <!-- Color Palette -->
  <div style="flex-shrink:0;padding:10px 8px 16px;">
    <div style="background:rgba(0,0,0,.3);border-radius:20px;padding:10px 8px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;">
      <div id="palette"></div>
    </div>
    <div style="color:rgba(255,255,255,.7);font-size:clamp(11px,3.2vw,14px);text-align:center;margin-top:6px;">👆 เลือกสี แล้วแตะรูปเพื่อระบาย</div>
  </div>
</div>

let selColor = '#f1c40f';
let currentPicKey = null;

function ss(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id)); }

// Build palette
(()=>{
  const pal = document.getElementById('palette');
  pal.style.cssText='display:flex;flex-wrap:wrap;justify-content:center;gap:8px;';
  PAL_COLORS.forEach((c,i)=>{
    const b = document.createElement('div');
    b.className='pal-btn'+(i===2?' selected':''); // yellow selected by default (index 2)
    b.style.background = c.hex;
    b.title = c.name;
    b.addEventListener('click', ()=>{
      selColor=c.hex;
      document.querySelectorAll('.pal-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
    });
    pal.appendChild(b);
  });
})();

function openPicture(key) {
  currentPicKey = key;
  const pic = PICS[key];
  document.getElementById('ctitle').textContent = pic.title;
  const wrap = document.getElementById('svgwrap');
  wrap.innerHTML = pic.svg;
  // Attach fill events
  wrap.querySelectorAll('.fillable').forEach(el=>{
    el.addEventListener('click', function(e){
      e.stopPropagation();
      const target = e.target.closest('.fillable');
      if (!target) return;
      target.setAttribute('fill', selColor);
      // Animate
      target.style.animation='none'; void target.offsetWidth; target.style.animation='pop .3s ease both';
    });
  });
  ss('scolor');
}

function clearPicture() {
  if (!currentPicKey) return;
  const wrap = document.getElementById('svgwrap');
  wrap.querySelectorAll('.fillable').forEach(el=>{
    el.setAttribute('fill','#fff');
    // for groups reset children too
    el.querySelectorAll('[fill]').forEach(child=>{
      if (!child.classList.contains('nofill')) child.setAttribute('fill','#fff');
    });
  });
}

function exitColor() {
  ss('spick');
}
