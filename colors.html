<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎨 เรียนรู้สี</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
body { font-family:'Fredoka One','Sarabun',sans-serif; overflow:hidden; height:100dvh; width:100vw; background:#1a1a2e; touch-action:pan-y; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; transition:opacity .35s,transform .35s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }
.btn { transition:transform .15s; cursor:pointer; user-select:none; }
.btn:active { transform:scale(0.88)!important; }
.c-card { border-radius:18px; cursor:pointer; user-select:none; transition:transform .2s; display:flex; flex-direction:column; align-items:center; justify-content:center; aspect-ratio:1; }
.c-card:active { transform:scale(0.88); }
@keyframes bounce-in { 0%{transform:scale(.2);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1} }
@keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<!-- HUD -->
<div style="position:fixed;top:0;left:0;right:0;z-index:200;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;">
  <a href="index.html" style="background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border-radius:30px;padding:8px 14px;pointer-events:auto;display:flex;align-items:center;border:1.5px solid rgba(255,255,255,.3);text-decoration:none;font-size:18px;">🏠</a>
  <div style="background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border-radius:30px;padding:5px 14px;display:flex;align-items:center;gap:5px;border:1.5px solid rgba(255,220,80,.4);">
    <span style="font-size:18px;">⭐</span><span id="stars" style="color:#fcd34d;font-weight:900;font-size:17px;">0</span>
  </div>
</div>

<!-- Grid Screen -->
<div id="sg" class="screen" style="background:linear-gradient(135deg,#f093fb,#f5576c);">
  <div style="padding-top:62px;text-align:center;flex-shrink:0;padding-bottom:8px;">
    <h2 style="color:#fff;font-size:clamp(22px,6vw,32px);font-weight:900;">🎨 เรียนรู้สี</h2>
    <p style="color:rgba(255,255,255,.75);font-size:clamp(12px,3.5vw,16px);">กดสีที่ต้องการเรียน</p>
  </div>
  <div id="cgrid" style="flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;overflow-y:auto;align-content:start;"></div>
  <div style="flex-shrink:0;display:flex;gap:10px;padding:10px 12px 18px;">
    <button onclick="startLearn(0)" class="btn" style="flex:1;background:rgba(255,255,255,.25);color:#fff;border:2px solid rgba(255,255,255,.5);border-radius:16px;padding:14px;font-size:clamp(14px,4vw,18px);font-weight:900;font-family:inherit;">📖 เรียนทีละสี</button>
    <button onclick="startQuiz()" class="btn" style="flex:1;background:rgba(255,255,255,.25);color:#fff;border:2px solid rgba(255,255,255,.5);border-radius:16px;padding:14px;font-size:clamp(14px,4vw,18px);font-weight:900;font-family:inherit;">🎮 ทดสอบ</button>
  </div>
</div>

<!-- Learn Screen -->
<div id="sl" class="screen hidden">
  <div style="padding-top:62px;display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;flex-shrink:0;padding-bottom:8px;">
    <button onclick="showGrid()" class="btn" style="background:rgba(255,255,255,.25);border:none;border-radius:50%;width:48px;height:48px;font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;">←</button>
    <div id="lctr" style="color:rgba(255,255,255,.9);font-size:clamp(14px,4vw,18px);font-weight:700;"></div>
    <div style="width:48px;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;">
    <div id="lswatch" onclick="speakCurrent()" class="btn" style="width:clamp(150px,45vw,260px);height:clamp(150px,45vw,260px);border-radius:36px;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:clamp(56px,16vw,100px);animation:bounce-in .5s both;"></div>
    <div id="lthai" style="color:#fff;font-size:clamp(30px,9vw,52px);font-weight:900;margin-top:20px;text-shadow:2px 2px 4px rgba(0,0,0,.3);"></div>
    <div id="leng" style="color:rgba(255,255,255,.85);font-size:clamp(20px,6vw,34px);font-weight:700;margin-top:6px;"></div>
    <p style="color:rgba(255,255,255,.5);font-size:13px;margin-top:14px;">👆 แตะเพื่อฟังเสียง</p>
  </div>
  <div style="flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 16px 20px;">
    <button id="bprev" onclick="prevC()" class="btn" style="background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);border-radius:50%;width:60px;height:60px;font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;">◀</button>
    <button onclick="speakCurrent()" class="btn" style="flex:1;background:rgba(255,255,255,.3);border:3px solid rgba(255,255,255,.6);border-radius:16px;padding:14px;font-size:clamp(15px,4.5vw,20px);color:#fff;font-weight:900;font-family:inherit;">🔊 ฟังเสียง</button>
    <button id="bnext" onclick="nextC()" class="btn" style="background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);border-radius:50%;width:60px;height:60px;font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;">▶</button>
  </div>
</div>

<!-- Quiz Screen -->
<div id="sq" class="screen hidden" style="background:linear-gradient(135deg,#11998e,#38ef7d);">
  <div style="padding-top:62px;display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;flex-shrink:0;">
    <button onclick="showGrid()" class="btn" style="background:rgba(255,255,255,.25);border:none;border-radius:50%;width:48px;height:48px;font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;">←</button>
    <div id="qctr" style="color:#fff;font-size:clamp(16px,4.5vw,22px);font-weight:900;"></div>
    <div style="width:48px;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;">
    <div style="color:#fff;font-size:clamp(20px,6vw,32px);font-weight:900;margin-bottom:12px;">สีนี้คือสีอะไร?</div>
    <div id="qswatch" style="width:clamp(90px,26vw,150px);height:clamp(90px,26vw,150px);border-radius:26px;box-shadow:0 10px 30px rgba(0,0,0,.4);margin-bottom:20px;font-size:clamp(44px,12vw,72px);display:flex;align-items:center;justify-content:center;"></div>
    <div id="qchoices" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px;"></div>
  </div>
  <div style="flex-shrink:0;padding:8px 16px 16px;">
    <div id="qfb" style="color:#fff;font-size:clamp(15px,4.5vw,20px);font-weight:800;text-align:center;min-height:30px;"></div>
  </div>
</div>

<!-- Result Screen -->
<div id="sr" class="screen hidden" style="background:linear-gradient(135deg,#fa709a,#fee140);">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
    <div style="font-size:clamp(56px,16vw,90px);">🎉</div>
    <h1 style="color:#fff;font-size:clamp(26px,7.5vw,44px);font-weight:900;margin:8px 0;">เก่งมากเลย!</h1>
    <div id="rstars" style="font-size:clamp(36px,10vw,60px);margin:6px 0;"></div>
    <p id="rscore" style="color:#fff;font-size:clamp(16px,5vw,26px);font-weight:800;text-align:center;"></p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;width:100%;max-width:280px;">
      <button onclick="startQuiz()" class="btn" style="background:rgba(255,255,255,.95);color:#f5576c;border:none;border-radius:18px;padding:12px;font-size:clamp(16px,4.5vw,20px);font-weight:900;font-family:inherit;">🔄 เล่นอีกครั้ง</button>
      <button onclick="showGrid()" class="btn" style="background:rgba(255,255,255,.3);color:#fff;border:2px solid rgba(255,255,255,.5);border-radius:18px;padding:12px;font-size:clamp(15px,4vw,19px);font-weight:900;font-family:inherit;">🎨 กลับไปเรียน</button>
    </div>
  </div>
</div>

<script>
const COLORS=[
  {id:'red',    thai:'สีแดง',     english:'Red',      hex:'#e74c3c', emoji:'🔴'},
  {id:'blue',   thai:'สีน้ำเงิน', english:'Blue',     hex:'#2980b9', emoji:'🔵'},
  {id:'yellow', thai:'สีเหลือง',  english:'Yellow',   hex:'#f1c40f', emoji:'🟡'},
  {id:'green',  thai:'สีเขียว',   english:'Green',    hex:'#27ae60', emoji:'🟢'},
  {id:'orange', thai:'สีส้ม',     english:'Orange',   hex:'#e67e22', emoji:'🟠'},
  {id:'purple', thai:'สีม่วง',    english:'Purple',   hex:'#8e44ad', emoji:'🟣'},
  {id:'pink',   thai:'สีชมพู',    english:'Pink',     hex:'#e91e63', emoji:'🩷'},
  {id:'white',  thai:'สีขาว',     english:'White',    hex:'#dfe6e9', emoji:'⚪'},
  {id:'black',  thai:'สีดำ',      english:'Black',    hex:'#2c3e50', emoji:'⚫'},
  {id:'brown',  thai:'สีน้ำตาล',  english:'Brown',    hex:'#795548', emoji:'🟤'},
  {id:'sky',    thai:'สีฟ้า',     english:'Sky Blue', hex:'#03a9f4', emoji:'🩵'},
  {id:'gray',   thai:'สีเทา',     english:'Gray',     hex:'#607d8b', emoji:'🩶'},
];
const LIGHT = new Set(['yellow','white','sky']);

let idx=0, stars=0, quiz={};

function ss(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id)); }

function spk(text, lang, cb) {
  if (!window.speechSynthesis) { if(cb) setTimeout(cb,100); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=0.82; u.pitch=1.1;
  u.onend = () => { if(cb) setTimeout(cb,120); };
  u.onerror = () => { if(cb) setTimeout(cb,120); };
  setTimeout(()=>speechSynthesis.speak(u), 60);
}

function speakCurrent() {
  const c = COLORS[idx];
  const el = document.getElementById('lswatch');
  el.style.animation='none'; void el.offsetWidth; el.style.animation='bounce-in .4s both';
  spk(c.thai, 'th-TH', ()=>setTimeout(()=>spk(c.english,'en-US'), 250));
}

function showGrid() {
  window.speechSynthesis && speechSynthesis.cancel();
  ss('sg');
  const ct = document.getElementById('cgrid');
  ct.innerHTML = '';
  COLORS.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'c-card btn';
    d.style.cssText = `background:${c.hex};box-shadow:0 4px 14px rgba(0,0,0,.3);`;
    const tc = LIGHT.has(c.id) ? '#333' : '#fff';
    d.innerHTML = `<div style="font-size:clamp(26px,7vw,40px);">${c.emoji}</div>
      <div style="color:${tc};font-size:clamp(10px,2.8vw,14px);font-weight:700;margin-top:5px;text-align:center;padding:0 4px;">${c.thai}</div>`;
    d.addEventListener('click', ()=>startLearn(i));
    ct.appendChild(d);
  });
}

function startLearn(i) {
  idx=i; ss('sl'); renderLearn();
  setTimeout(speakCurrent, 400);
}

function renderLearn() {
  const c = COLORS[idx];
  document.getElementById('sl').style.background = `linear-gradient(135deg,${c.hex}dd,${c.hex}88)`;
  const sw = document.getElementById('lswatch');
  sw.style.background = c.hex; sw.textContent = c.emoji;
  sw.style.boxShadow = `0 20px 60px ${c.hex}88`;
  document.getElementById('lthai').textContent = c.thai;
  document.getElementById('leng').textContent = c.english;
  document.getElementById('lctr').textContent = `${idx+1} / ${COLORS.length}`;
  document.getElementById('bprev').style.opacity = idx===0 ? '.3' : '1';
  document.getElementById('bnext').style.opacity = idx===COLORS.length-1 ? '.3' : '1';
}

function nextC() { if(idx<COLORS.length-1){ idx++; renderLearn(); setTimeout(speakCurrent,300); } }
function prevC() { if(idx>0){ idx--; renderLearn(); setTimeout(speakCurrent,300); } }

function startQuiz() {
  const pool = [...COLORS].sort(()=>Math.random()-.5).slice(0,6);
  quiz = { qs: pool.map(c=>{
    const w = COLORS.filter(x=>x!==c).sort(()=>Math.random()-.5).slice(0,2);
    return { correct:c, choices:[c,...w].sort(()=>Math.random()-.5) };
  }), cur:0, score:0, done:false };
  ss('sq'); renderQuiz();
}

function renderQuiz() {
  const q = quiz.qs[quiz.cur];
  document.getElementById('qctr').textContent = `ข้อ ${quiz.cur+1} / ${quiz.qs.length}`;
  const sw = document.getElementById('qswatch');
  sw.style.background = q.correct.hex; sw.textContent = q.correct.emoji;
  document.getElementById('qfb').textContent = '';
  setTimeout(()=>spk(q.correct.thai,'th-TH'), 350);
  const ct = document.getElementById('qchoices'); ct.innerHTML='';
  q.choices.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'btn';
    b.style.cssText=`background:${c.hex};border:3px solid rgba(255,255,255,.6);border-radius:14px;padding:14px 8px;font-size:clamp(13px,4vw,17px);font-weight:900;color:${LIGHT.has(c.id)?'#333':'#fff'};font-family:inherit;cursor:pointer;width:100%;`;
    b.textContent = c.thai;
    b.addEventListener('click', ()=>checkAns(c===q.correct, b));
    ct.appendChild(b);
  });
  quiz.done = false;
}

function checkAns(ok, btn) {
  if (quiz.done) return; quiz.done=true;
  if (ok) {
    quiz.score++; stars+=2; document.getElementById('stars').textContent=stars;
    btn.style.boxShadow='0 0 0 4px #22c55e,0 0 20px #22c55e';
    document.getElementById('qfb').textContent='✅ ถูกต้อง! เก่งมาก!';
    spk('เก่งมากเลย', 'th-TH');
  } else {
    btn.style.opacity='.4';
    document.getElementById('qfb').textContent='❌ ลองใหม่นะ!';
    spk('ลองใหม่นะ', 'th-TH');
  }
  setTimeout(()=>{ quiz.cur++; quiz.cur<quiz.qs.length ? renderQuiz() : showResult(); }, 1500);
}

function showResult() {
  const pct = Math.round(quiz.score/quiz.qs.length*100);
  document.getElementById('rstars').textContent = pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
  document.getElementById('rscore').textContent = `ตอบถูก ${quiz.score} จาก ${quiz.qs.length} ข้อ`;
  ss('sr');
  spk(pct>=80?'เก่งมากเลย ยอดเยี่ยม':'ลองอีกครั้งนะ','th-TH');
}

showGrid();
</script>
</body>
</html>
