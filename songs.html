<script src="https://cdn.tailwindcss.com"></script>
<style>
* { -webkit-tap-highlight-color:transparent; box-sizing:border-box; }
body { font-family:'Fredoka One','Sarabun',sans-serif; overflow:hidden; height:100dvh; width:100vw; background:#1a1a2e; touch-action:pan-y; }
.screen { position:absolute; inset:0; display:flex; flex-direction:column; transition:opacity .35s,transform .35s; }
.screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }
.btn { transition:transform .15s; cursor:pointer; user-select:none; }
.btn:active { transform:scale(0.88)!important; }
@keyframes bounce-in { 0%{transform:scale(.2) rotate(-10deg);opacity:0}60%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.06)} }
.dot { width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .2s,transform .2s; }
.dot.active { background:#fff;transform:scale(1.3); }
</style>

<body>

<div style="position:fixed;top:0;left:0;right:0;z-index:200;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;">
  <a href="index.html" style="background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border-radius:30px;padding:8px 14px;pointer-events:auto;display:flex;align-items:center;border:1.5px solid rgba(255,255,255,.3);text-decoration:none;font-size:18px;">🏠</a>

      </div>

        <div style="color:#fff;font-size:clamp(18px,5.5vw,28px);font-weight:900;">Twinkle Twinkle</div>

</div>

<!-- Player Screen -->
<div id="splayer" class="screen hidden" style="background:linear-gradient(135deg,#667eea,#764ba2);">
  <div style="padding-top:62px;display:flex;align-items:center;justify-content:space-between;padding-left:16px;padding-right:16px;flex-shrink:0;">
    <button onclick="exitPlayer()" class="btn" style="background:rgba(255,255,255,.2);border:none;border-radius:50%;width:48px;height:48px;font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;">←</button>
    <div id="stitle" style="color:#fff;font-size:clamp(16px,4.8vw,24px);font-weight:900;"></div>
    <div style="width:48px;"></div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:8px;">
    <div id="sbigchar" style="font-size:clamp(90px,28vw,200px);line-height:1;animation:bounce-in .5s both;filter:drop-shadow(4px 6px 12px rgba(0,0,0,.35));color:#fff;font-weight:900;text-align:center;"></div>

    <!-- Progress dots -->
    <div id="sdots" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:300px;margin-top:8px;"></div>
  </div>

  <div style="flex-shrink:0;display:flex;align-items:center;gap:12px;padding:12px 20px 24px;">
    <button onclick="prevItem()" class="btn" style="background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;width:60px;height:60px;font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;">◀</button>
    <button id="playbtn" onclick="togglePlay()" class="btn" style="flex:1;background:rgba(255,255,255,.95);color:#764ba2;border:none;border-radius:20px;padding:16px;font-size:clamp(18px,5.5vw,26px);font-weight:900;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;">
      <span id="playbtnicon">▶</span><span id="playbtntxt">เล่น</span>
    </button>
    <button onclick="nextItem()" class="btn" style="background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50%;width:60px;height:60px;font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;">▶</button>
  </div>
</div>

const NOTES = { C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88, C5:523.25 };

let song=null, curIdx=0, playing=false, autoTimer=null, AC=null;

function initAC() {
  if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state==='suspended') AC.resume().catch(()=>{});
}

function playNote(noteName, dur) {
  initAC();
  if (!AC) return;
  try {
    const freq = NOTES[noteName] || 440;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    const t = AC.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.25, t+0.04);
    g.gain.setValueAtTime(0.25, t+dur*0.7);
    g.gain.linearRampToValueAtTime(0, t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}

function spk(text, lang, cb) {
  if (!window.speechSynthesis) { if(cb) setTimeout(cb,100); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang=lang; u.rate=0.85; u.pitch=1.1;
  u.onend = () => { if(cb) setTimeout(cb,100); };
  u.onerror = () => { if(cb) setTimeout(cb,100); };
  setTimeout(()=>speechSynthesis.speak(u), 60);
}

function ss(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('hidden',s.id!==id)); }

function loadSong(key) {
  song = SONGS[key];
  curIdx = 0; playing = false;
  ss('splayer');
  document.getElementById('stitle').textContent = song.title;
  renderItem();
  buildDots();
}

function exitPlayer() {
  stopPlay();
  window.speechSynthesis && speechSynthesis.cancel();
  ss('slist');
}

function buildDots() {
  const ct = document.getElementById('sdots'); ct.innerHTML='';
  const max = Math.min(song.items.length, 30);
  for(let i=0;i<max;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===curIdx?' active':'');
    d.id='dot-'+i; ct.appendChild(d);
  }
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===curIdx));
}

function renderItem() {
  const it = song.items[curIdx];
  const el = document.getElementById('sbigchar');
  el.style.animation='none'; void el.offsetWidth; el.style.animation='bounce-in .45s both';
  el.textContent = it.char;
  document.getElementById('ssub').textContent = it.sub || '';
  document.getElementById('ssub2').textContent = it.sub2 || '';
  updateDots();
}

function speakItem(cb) {
  const it = song.items[curIdx];
  playNote(it.note, it.dur);
  spk(it.char, song.lang, cb);
}

function togglePlay() {
  initAC();
  if (playing) { stopPlay(); }
  else { playing=true; updatePlayBtn(); advancePlay(); }
}

function stopPlay() {
  playing=false; clearTimeout(autoTimer);
  window.speechSynthesis && speechSynthesis.cancel();
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playbtnicon').textContent = playing ? '⏸' : '▶';
  document.getElementById('playbtntxt').textContent = playing ? 'หยุด' : 'เล่น';
}

function advancePlay() {
  if (!playing) return;
  renderItem();
  speakItem(()=>{
    if (!playing) return;
    autoTimer = setTimeout(()=>{
      if (!playing) return;
      if (curIdx < song.items.length-1) { curIdx++; advancePlay(); }
      else { stopPlay(); curIdx=0; renderItem(); }
    }, 400);
  });
}

function nextItem() {
  stopPlay();
  if (curIdx < song.items.length-1) { curIdx++; renderItem(); speakItem(null); }
}

function prevItem() {
  stopPlay();
  if (curIdx > 0) { curIdx--; renderItem(); speakItem(null); }
}

// iOS audio unlock on touch
document.addEventListener('touchstart', ()=>initAC(), {once:true});
