// ── Note frequencies ──────────────────────────────────────
const NOTES = { C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88, C5:523.25 };

// ── State ─────────────────────────────────────────────────
let song = null, curIdx = 0, playing = false, autoTimer = null, AC = null;

// ── AudioContext ──────────────────────────────────────────
function initAC() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume().catch(() => {});
}

// Piano-ish tone: triangle fundamental + octave overtone, ADSR envelope
function playNote(noteName, durationMs) {
  initAC();
  if (!AC) return;
  const dur  = Math.max(0.14, durationMs / 1000 * 0.80);
  const freq = NOTES[noteName] || 392;
  const t    = AC.currentTime;
  try {
    const master = AC.createGain();
    master.connect(AC.destination);

    const o1 = AC.createOscillator();  // warm triangle
    o1.type = 'triangle';
    o1.frequency.value = freq;

    const o2 = AC.createOscillator();  // soft octave shimmer
    o2.type = 'sine';
    o2.frequency.value = freq * 2;
    const g2 = AC.createGain();
    g2.gain.value = 0.16;

    // ADSR
    master.gain.setValueAtTime(0, t);
    master.gain.linearRampToValueAtTime(0.42,  t + 0.016);       // fast attack
    master.gain.exponentialRampToValueAtTime(0.26, t + 0.07);    // decay
    master.gain.setValueAtTime(0.26, t + dur * 0.74);            // sustain
    master.gain.linearRampToValueAtTime(0,     t + dur);         // release

    o1.connect(master);
    o2.connect(g2);  g2.connect(master);
    o1.start(t);  o1.stop(t + dur + 0.06);
    o2.start(t);  o2.stop(t + dur + 0.06);
  } catch(e) {}
}

// ── TTS: fire-and-forget (no waiting for onend) ───────────
function spkFire(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = lang;
  u.rate  = 1.15;
  u.pitch = 1.12;
  setTimeout(() => { try { speechSynthesis.speak(u); } catch(e){} }, 35);
}

// ── Screens ───────────────────────────────────────────────
function ss(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id !== id));
}

// ── Load song ─────────────────────────────────────────────
function loadSong(key) {
  song    = SONGS[key];
  curIdx  = 0;
  playing = false;
  ss('splayer');
  document.getElementById('stitle').textContent = song.title;
  buildDots();
  renderItem(false);
  updatePlayBtn();
}

function exitPlayer() {
  stopPlay();
  window.speechSynthesis && speechSynthesis.cancel();
  ss('slist');
}

// ── Progress dots ─────────────────────────────────────────
function buildDots() {
  const ct = document.getElementById('sdots');
  ct.innerHTML = '';
  const max = Math.min(song.items.length, 36);
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    ct.appendChild(d);
  }
}
function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === curIdx));
}

// ── Render item ───────────────────────────────────────────
function renderItem(isPlaying) {
  const it = song.items[curIdx];
  const el = document.getElementById('sbigchar');
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = isPlaying ? 'beat-flash 0.22s ease both' : 'bounce-in .42s both';
  el.textContent = it.char;
  document.getElementById('ssub').textContent  = it.sub  || '';
  document.getElementById('ssub2').textContent = it.sub2 || '';
  updateDots();
}

// ── Play engine — BPM-fixed timer, TTS simultaneous ───────
function togglePlay() {
  initAC();
  if (playing) stopPlay();
  else { playing = true; updatePlayBtn(); playStep(); }
}

function stopPlay() {
  playing = false;
  clearTimeout(autoTimer);
  window.speechSynthesis && speechSynthesis.cancel();
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playbtnicon').textContent = playing ? '⏸' : '▶';
  document.getElementById('playbtntxt').textContent  = playing ? 'หยุด' : 'เล่น';
}

function playStep() {
  if (!playing) return;
  const it = song.items[curIdx];
  const ms = beatMs(it.beats);

  // 1. Animate display
  renderItem(true);

  // 2. Play musical note
  playNote(it.note, ms);

  // 3. TTS fires in parallel — does NOT block the timer
  spkFire(it.char, song.lang);

  // 4. Advance by strict BPM timer
  autoTimer = setTimeout(() => {
    if (!playing) return;
    if (curIdx < song.items.length - 1) {
      curIdx++;
      playStep();
    } else {
      stopPlay();
      curIdx = 0;
      renderItem(false);
    }
  }, ms);
}

// ── Manual navigation ─────────────────────────────────────
function nextItem() {
  stopPlay();
  if (curIdx < song.items.length - 1) {
    curIdx++;
    renderItem(false);
    initAC();
    const it = song.items[curIdx];
    playNote(it.note, beatMs(it.beats));
    spkFire(it.char, song.lang);
  }
}
function prevItem() {
  stopPlay();
  if (curIdx > 0) {
    curIdx--;
    renderItem(false);
    initAC();
    const it = song.items[curIdx];
    playNote(it.note, beatMs(it.beats));
    spkFire(it.char, song.lang);
  }
}

// ── Tempo control ─────────────────────────────────────────
function setTempo(mult) {
  const wasPlaying = playing;
  if (wasPlaying) stopPlay();
  tempoMult = mult;
  document.querySelectorAll('[id^="tbtn-"]').forEach(b => {
    b.style.background = 'rgba(255,255,255,.18)';
    b.style.border = '2px solid rgba(255,255,255,.35)';
  });
  const map = { 1.55:'slow', 1.0:'normal', 0.65:'fast' };
  const btn = document.getElementById('tbtn-' + map[mult]);
  if (btn) { btn.style.background = 'rgba(255,255,255,.45)'; btn.style.border = '2px solid #fff'; }
  if (wasPlaying) { playing = true; updatePlayBtn(); playStep(); }
}

// iOS audio unlock on first touch
document.addEventListener('touchstart', () => initAC(), { once: true });
</script>
</body>
</html>
